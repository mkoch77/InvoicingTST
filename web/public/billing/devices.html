<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Services – Abrechnung</title>
  <link rel="stylesheet" href="/style.css?v=10">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>Client Services – Abrechnung</h1>
      <div class="controls">
        <label for="month-select">Monat:</label>
        <select id="month-select"><option value="">Laden…</option></select>
        <button id="expand-all-btn" class="btn btn-sm">Alle aufklappen</button>
        <button id="collapse-all-btn" class="btn btn-sm">Alle zuklappen</button>
        <button id="sync-btn" class="btn">Intune Sync</button>
      </div>
    </div>
    <div id="billing-summary" class="billing-summary"></div>
    <div id="billing-content" class="billing-content"><div class="vm-stats-loading">Lade Abrechnungsdaten…</div></div>
  </div>
  <script src="/app.js?v=10"></script>
  <script>
    function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
    function formatMonth(m){if(!m)return'';const[y,mo]=m.split('-');return new Date(y,parseInt(mo)-1).toLocaleDateString('de-DE',{year:'numeric',month:'long'});}
    function fmtDate(v){if(!v)return'';return new Date(v).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}

    async function loadBilling(month) {
      const content=document.getElementById('billing-content');
      const summary=document.getElementById('billing-summary');
      content.innerHTML='<div class="vm-stats-loading">Lade Abrechnungsdaten…</div>';
      try {
        const url=month?`/api/billing-devices.php?month=${encodeURIComponent(month)}`:'/api/billing-devices.php';
        const res=await fetch(url);
        const data=await res.json();
        if(data.error)throw new Error(data.error);

        const sel=document.getElementById('month-select');
        if(sel.options.length<=1&&data.months){sel.innerHTML='';for(const m of data.months){const o=document.createElement('option');o.value=m;o.textContent=formatMonth(m);if(m===data.month)o.selected=true;sel.appendChild(o);}}

        summary.innerHTML=`<div class="billing-summary-card">
          <span class="billing-summary-label">${formatMonth(data.month)}</span>
          <span class="billing-summary-value">${data.total_devices} Geräte / ${data.total_users} Benutzer</span>
        </div>`;

        if(!data.companies||!data.companies.length){content.innerHTML='<div class="vm-stats-loading">Keine Gerätedaten.</div>';return;}

        let html='';
        for(const company of data.companies){
          html+=`<div class="billing-company collapsed">
            <div class="billing-company-header" onclick="this.parentElement.classList.toggle('collapsed')">
              <div class="billing-company-info"><span class="billing-toggle">&#x25BC;</span><strong>${esc(company.company)}</strong>${company.address?`<span class="billing-address">${esc(company.address)}</span>`:''}</div>
              <div class="billing-company-totals"><span class="billing-count">${company.total_users} Benutzer / ${company.total_devices} Geräte</span></div>
            </div><div class="billing-company-body">`;

          for(const cc of company.cost_centers){
            html+=`<div class="billing-cc collapsed">
              <div class="billing-cc-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <div class="billing-cc-info"><span class="billing-toggle">&#x25BC;</span><strong>KSt ${esc(cc.number)}</strong>${cc.bearer?`<span class="billing-bearer">${esc(cc.bearer)}</span>`:''}</div>
                <div class="billing-cc-totals"><span class="billing-count">${cc.total_users} Benutzer / ${cc.total_devices} Geräte</span></div>
              </div><div class="billing-cc-body">
                <table class="billing-table"><thead><tr><th>Benutzer</th><th>E-Mail</th><th>Gerätename</th><th>Hersteller</th><th>Modell</th><th>Seriennr.</th><th>Compliance</th></tr></thead><tbody>`;

            for(const user of cc.users){
              for(let i=0;i<user.devices.length;i++){
                const dev=user.devices[i];
                const compColor=dev.compliance==='compliant'?'color:#4ade80':dev.compliance==='noncompliant'?'color:#f87171':'';
                html+=`<tr>
                  ${i===0?`<td rowspan="${user.devices.length}">${esc(user.display_name)}</td><td rowspan="${user.devices.length}" style="font-size:.85rem">${esc(user.upn)}</td>`:''}
                  <td>${esc(dev.name)}</td><td>${esc(dev.manufacturer||'')}</td><td>${esc(dev.model||'')}</td>
                  <td>${esc(dev.serial||'')}</td><td style="${compColor}">${esc(dev.compliance||'')}</td>
                </tr>`;
              }
            }

            html+=`</tbody><tfoot><tr class="billing-subtotal"><td colspan="7"><strong>Summe KSt ${esc(cc.number)}: ${cc.total_users} Benutzer / ${cc.total_devices} Geräte</strong></td></tr></tfoot></table></div></div>`;
          }

          html+=`<div class="billing-company-subtotal"><strong>Summe ${esc(company.company)}</strong><strong>${company.total_users} Benutzer / ${company.total_devices} Geräte</strong></div></div></div>`;
        }

        html+=`<div class="billing-grand-total"><strong>Gesamtsumme</strong><span>${data.total_users} Benutzer / ${data.total_devices} Geräte</span></div>`;
        content.innerHTML=html;
      }catch(err){content.innerHTML=`<div class="vm-stats-loading">Fehler: ${esc(err.message)}</div>`;}
    }

    document.getElementById('month-select').addEventListener('change',e=>loadBilling(e.target.value));
    document.getElementById('expand-all-btn').addEventListener('click',()=>document.querySelectorAll('.billing-company,.billing-cc').forEach(el=>el.classList.remove('collapsed')));
    document.getElementById('collapse-all-btn').addEventListener('click',()=>document.querySelectorAll('.billing-company,.billing-cc').forEach(el=>el.classList.add('collapsed')));
    document.getElementById('sync-btn').addEventListener('click',async()=>{
      const btn=document.getElementById('sync-btn');btn.disabled=true;btn.textContent='Synchronisiere…';
      try{const r=await fetch('/api/devices.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'sync'})});const d=await r.json();if(d.error)throw new Error(d.error);if(typeof showToast==='function')showToast(d.message,'success');document.getElementById('month-select').innerHTML='<option value="">Laden…</option>';loadBilling();}catch(e){if(typeof showToast==='function')showToast(e.message,'error');}finally{btn.disabled=false;btn.textContent='Intune Sync';}
    });
    loadBilling();
  </script>
</body>
</html>
