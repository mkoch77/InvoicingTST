<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesamtabrechnung – Accounting</title>
  <link rel="stylesheet" href="/style.css?v=10">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>Gesamtabrechnung</h1>
      <div class="controls">
        <label for="month-select">Monat:</label>
        <select id="month-select"><option value="">Laden…</option></select>
        <label for="company-select">Firma:</label>
        <select id="company-select"><option value="">Alle</option></select>
        <label for="cc-select">Kostenstelle:</label>
        <select id="cc-select"><option value="">Alle</option></select>
        <button id="expand-all-btn" class="btn btn-sm">Alle aufklappen</button>
        <button id="collapse-all-btn" class="btn btn-sm">Alle zuklappen</button>
      </div>
    </div>
    <div id="billing-summary" class="billing-summary"></div>
    <div id="billing-content" class="billing-content"><div class="vm-stats-loading">Lade Abrechnungsdaten…</div></div>
  </div>
  <script src="/app.js?v=10"></script>
  <script>
    function fmtEur(val) { return Number(val).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' \u20AC'; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
    function formatMonth(m) { if (!m) return ''; const [y,mo] = m.split('-'); return new Date(y, parseInt(mo)-1).toLocaleDateString('de-DE', { year:'numeric', month:'long' }); }

    const serviceColors = {
      'IaaS Server Hosting': '#4ade80',
      'Microsoft 365 Lizenzen': '#60a5fa',
      'Client Services': '#facc15',
    };
    const serviceIcons = {
      'IaaS Server Hosting': '&#x1F5A5;',
      'Microsoft 365 Lizenzen': '&#x1F4BB;',
      'Client Services': '&#x1F4F1;',
    };

    let currentMonth = '';

    async function loadBilling() {
      const content = document.getElementById('billing-content');
      const summary = document.getElementById('billing-summary');
      content.innerHTML = '<div class="vm-stats-loading">Lade Abrechnungsdaten…</div>';

      const month = document.getElementById('month-select').value || '';
      const company = document.getElementById('company-select').value;
      const cc = document.getElementById('cc-select').value;

      let url = '/api/billing-overview.php?';
      if (month) url += `month=${encodeURIComponent(month)}&`;
      if (company) url += `company=${encodeURIComponent(company)}&`;
      if (cc) url += `cost_center=${encodeURIComponent(cc)}&`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        currentMonth = data.month;

        // Populate month select (once)
        const mSel = document.getElementById('month-select');
        if (mSel.options.length <= 1 && data.months) {
          mSel.innerHTML = '';
          for (const m of data.months) {
            const o = document.createElement('option');
            o.value = m; o.textContent = formatMonth(m);
            if (m === data.month) o.selected = true;
            mSel.appendChild(o);
          }
        }

        // Populate filter dropdowns (once)
        const coSel = document.getElementById('company-select');
        if (coSel.options.length <= 1 && data.filter_companies) {
          for (const c of data.filter_companies) {
            const o = document.createElement('option');
            o.value = c; o.textContent = c;
            if (c === company) o.selected = true;
            coSel.appendChild(o);
          }
        }
        const ccSel = document.getElementById('cc-select');
        if (ccSel.options.length <= 1 && data.filter_cost_centers) {
          for (const c of data.filter_cost_centers) {
            const o = document.createElement('option');
            o.value = c; o.textContent = 'KSt ' + c;
            if (c === cc) o.selected = true;
            ccSel.appendChild(o);
          }
        }

        // Summary
        summary.innerHTML = `
          <div class="billing-summary-card">
            <span class="billing-summary-label">${formatMonth(data.month)}</span>
            ${company ? `<span class="billing-summary-value">${esc(company)}</span>` : ''}
            ${cc ? `<span class="billing-summary-value">KSt ${esc(cc)}</span>` : ''}
            <span class="billing-summary-price">${fmtEur(data.total_price)}</span>
          </div>
        `;

        if (!data.companies || !data.companies.length) {
          content.innerHTML = '<div class="vm-stats-loading">Keine Abrechnungsdaten gefunden.</div>';
          return;
        }

        let html = '';
        for (const co of data.companies) {
          html += `
            <div class="billing-company collapsed">
              <div class="billing-company-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <div class="billing-company-info">
                  <span class="billing-toggle">&#x25BC;</span>
                  <strong>${esc(co.company)}</strong>
                </div>
                <div class="billing-company-totals">
                  <span class="billing-price">${fmtEur(co.total_price)}</span>
                </div>
              </div>
              <div class="billing-company-body">
          `;

          for (const cc of co.cost_centers) {
            html += `
              <div class="billing-cc collapsed">
                <div class="billing-cc-header" onclick="this.parentElement.classList.toggle('collapsed')">
                  <div class="billing-cc-info">
                    <span class="billing-toggle">&#x25BC;</span>
                    <strong>KSt ${esc(cc.number)}</strong>
                  </div>
                  <div class="billing-cc-totals">
                    <span class="billing-price">${fmtEur(cc.total_price)}</span>
                  </div>
                </div>
                <div class="billing-cc-body">
            `;

            for (const svc of cc.services) {
              const color = serviceColors[svc.service] || '#888';
              const icon = serviceIcons[svc.service] || '&#x1F4E6;';
              html += `
                <div class="billing-service-block collapsed">
                  <div class="billing-service-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <span class="billing-toggle">&#x25BC;</span>
                    <span style="color:${color}">${icon}</span>
                    <strong>${esc(svc.service)}</strong>
                    <span class="billing-count">${svc.count} Positionen</span>
                    <span class="billing-price">${fmtEur(svc.total_price)}</span>
                  </div>
                  <table class="billing-table billing-service-body">
                    <thead><tr><th>Beschreibung</th><th>Detail</th><th>Preis</th></tr></thead>
                    <tbody>
              `;

              for (const item of svc.items) {
                html += `<tr><td>${esc(item.description)}</td><td style="color:var(--text-muted);font-size:.85rem;">${esc(item.detail)}</td><td class="num">${fmtEur(item.price)}</td></tr>`;
              }

              html += `
                    </tbody>
                    <tfoot><tr class="billing-subtotal"><td colspan="2"><strong>${esc(svc.service)}</strong></td><td class="num"><strong>${fmtEur(svc.total_price)}</strong></td></tr></tfoot>
                  </table>
                </div>
              `;
            }

            html += `
                  <div class="billing-company-subtotal">
                    <strong>Summe KSt ${esc(cc.number)}</strong>
                    <strong>${fmtEur(cc.total_price)}</strong>
                  </div>
                </div>
              </div>
            `;
          }

          html += `
                <div class="billing-company-subtotal">
                  <strong>Summe ${esc(co.company)}</strong>
                  <strong>${fmtEur(co.total_price)}</strong>
                </div>
              </div>
            </div>
          `;
        }

        html += `
          <div class="billing-grand-total">
            <strong>Gesamtsumme</strong>
            <strong>${fmtEur(data.total_price)}</strong>
          </div>
        `;

        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = `<div class="vm-stats-loading">Fehler: ${esc(err.message)}</div>`;
      }
    }

    document.getElementById('month-select').addEventListener('change', () => {
      document.getElementById('company-select').innerHTML = '<option value="">Alle</option>';
      document.getElementById('cc-select').innerHTML = '<option value="">Alle</option>';
      loadBilling();
    });
    document.getElementById('company-select').addEventListener('change', loadBilling);
    document.getElementById('cc-select').addEventListener('change', loadBilling);
    document.getElementById('expand-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.billing-company,.billing-cc,.billing-service-block').forEach(el => el.classList.remove('collapsed'));
    });
    document.getElementById('collapse-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.billing-company,.billing-cc,.billing-service-block').forEach(el => el.classList.add('collapsed'));
    });

    loadBilling();
  </script>

  <style>
    .billing-service-block { margin: 0.5rem 0; }
    .billing-service-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0.6rem; background: rgba(255,255,255,0.02);
      border-radius: 4px; cursor: pointer; user-select: none;
    }
    .billing-service-header:hover { background: rgba(255,255,255,0.05); }
    .billing-service-header .billing-price { margin-left: auto; font-weight: 600; }
    .billing-service-header .billing-count { color: var(--text-muted); font-size: 0.85rem; }
    .billing-service-block.collapsed .billing-service-body { display: none; }
    .billing-service-block.collapsed .billing-toggle { transform: rotate(-90deg); }
  </style>
</body>
</html>
