<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMs – Accounting</title>
  <link rel="stylesheet" href="/style.css?v=9">
</head>
<body>

  <div class="container">
    <div class="page-header">
      <h1>Virtuelle Maschinen</h1>
      <div class="controls">
        <label for="month-select">Monat:</label>
        <select id="month-select">
          <option value="">Alle</option>
        </select>
        <input type="text" id="search-input" placeholder="Suchen…" />
        <label for="page-size">Zeilen:</label>
        <select id="page-size">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
          <option value="all">Alle</option>
        </select>
        <span id="vm-count" class="count"></span>
        <button id="export-btn" class="btn" title="Als Excel exportieren">&#x2B07; Excel</button>
      </div>
    </div>

    <div id="active-filters" class="active-filters"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-key="hostname" data-filterable>Hostname <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="customer_name" data-filterable data-filter-type="select">Kunde (Namensschema) <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="cmdb_customer" data-filterable data-filter-type="select">Kunde (CMDB) <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="ip_addresses" data-filterable>IP <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="operating_system" data-filterable data-filter-type="select">OS <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="vcpu">vCPU <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="vram_mb">RAM (MB) <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="used_storage_gb">Used (GB) <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="provisioned_storage_gb">Prov. (GB) <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="power_state" data-filterable data-filter-type="select">State <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="points">Punkte <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="pricing_class" data-filterable data-filter-type="select">Klasse <span class="sort-arrow">&#x25B2;</span></th>
            <th data-key="price">Preis <span class="sort-arrow">&#x25B2;</span></th>
          </tr>
        </thead>
        <tbody id="vm-rows">
          <tr><td colspan="13" class="empty">Daten werden geladen…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="pagination" class="pagination"></div>
  </div>
  <script src="/app.js?v=9"></script>
  <script src="/vms.js?v=9"></script>
</body>
</html>
