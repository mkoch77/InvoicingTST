<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kundenkürzel – Accounting</title>
  <link rel="stylesheet" href="/style.css?v=10">
</head>
<body>

  <div class="container">
    <div class="page-header">
      <h1>Kundenkürzel</h1>
      <div class="controls">
        <input type="text" id="search-input" placeholder="Suchen…" />
        <span id="customer-count" class="count"></span>
        <button class="btn" id="sync-cmdb-btn" title="Kundenkürzel aus Jira Assets CMDB synchronisieren">CMDB Sync</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Kunde</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script src="/app.js?v=10"></script>
  <script>
    let customers = [];

    async function load() {
      const res = await fetch('/api/customers.php');
      customers = await res.json();
      render();
    }

    function render() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      let filtered = customers;
      if (query) {
        filtered = customers.filter(c =>
          c.code.toLowerCase().includes(query) || c.name.toLowerCase().includes(query)
        );
      }

      document.getElementById('customer-count').textContent = `${filtered.length} Kürzel`;
      const tbody = document.getElementById('rows');

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Keine Kürzel gefunden.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      filtered.forEach(c => {
        const tr = document.createElement('tr');
        if (!c.is_active) tr.style.opacity = '0.5';
        tr.innerHTML = `
          <td><strong>${esc(c.code)}</strong></td>
          <td>${esc(c.name)}</td>
          <td>${c.is_active ? '<span class="state-on">Aktiv</span>' : '<span class="state-off">Inaktiv</span>'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    document.getElementById('sync-cmdb-btn').addEventListener('click', async () => {
      const btn = document.getElementById('sync-cmdb-btn');
      btn.disabled = true;
      btn.textContent = 'Synchronisiere…';
      try {
        const res = await fetch('/api/customers.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'sync_cmdb' }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Fehler');
        showToast(`${data.created} neu, ${data.updated} aktualisiert, ${data.deactivated} deaktiviert`, 'success');
        load();
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'CMDB Sync';
      }
    });

    document.getElementById('search-input').addEventListener('input', () => render());
    load();
  </script>
</body>
</html>
