<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Accounting</title>
  <link rel="stylesheet" href="/style.css?v=5">
</head>
<body class="login-body">
  <div class="login-card">
    <h1 class="login-brand">Accounting</h1>
    <p class="login-subtitle">Anmeldung</p>

    <div id="error-msg" class="login-error" style="display:none;"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn login-btn" id="login-btn">Anmelden</button>
    </form>

    <div class="login-divider"><span>oder</span></div>

    <a href="/api/auth/entra-redirect.php" class="btn login-entra-btn" id="entra-btn">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:0.5rem;">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Mit Microsoft anmelden
    </a>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me.php').then(r => { if (r.ok) window.location.href = '/'; });

    // Show error from URL (Entra ID callback)
    const urlError = new URLSearchParams(window.location.search).get('error');
    if (urlError) {
      const el = document.getElementById('error-msg');
      el.textContent = urlError;
      el.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Wird angemeldet…';

      try {
        const res = await fetch('/api/auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/';
          return;
        }

        const data = await res.json();
        if (res.status === 429 && data.retry_after) {
          errorEl.textContent = `Zu viele Fehlversuche. Bitte ${Math.ceil(data.retry_after / 60)} Min. warten.`;
        } else {
          errorEl.textContent = data.error || 'Anmeldung fehlgeschlagen';
        }
        errorEl.style.display = 'block';
      } catch (err) {
        errorEl.textContent = 'Verbindungsfehler';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
