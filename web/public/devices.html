<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebooks / Clients – Accounting</title>
  <link rel="stylesheet" href="/style.css?v=10">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>Notebooks / Clients – Rohdaten</h1>
      <div class="controls">
        <label for="month-select">Monat:</label>
        <select id="month-select"><option value="">Laden…</option></select>
        <input type="text" id="search-input" placeholder="Suchen…" />
        <label for="page-size">Zeilen:</label>
        <select id="page-size">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="all">Alle</option>
        </select>
        <span id="device-count" class="count"></span>
        <button id="sync-btn" class="btn">Intune Sync</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Gerätename</th><th>Benutzer</th><th>E-Mail</th><th>Hersteller</th>
          <th>Modell</th><th>Kategorie</th><th>Preis</th><th>Seriennr.</th><th>Compliance</th><th>Firma</th><th>KSt</th><th>Letzter Sync</th>
        </tr></thead>
        <tbody id="device-rows"><tr><td colspan="12" class="empty">Daten werden geladen…</td></tr></tbody>
      </table>
    </div>
    <div id="pagination" class="pagination"></div>
  </div>
  <script src="/app.js?v=10"></script>
  <script>
    let allDevices = [], currentPage = 1, currentMonth = '';
    function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
    function formatMonth(m) { if (!m) return ''; const [y,mo]=m.split('-'); return new Date(y,parseInt(mo)-1).toLocaleDateString('de-DE',{year:'numeric',month:'long'}); }
    function fmtDate(v) { if (!v) return ''; return new Date(v).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

    async function init() {
      const res = await fetch('/api/devices.php?action=months');
      const months = await res.json();
      const sel = document.getElementById('month-select');
      sel.innerHTML = '';
      for (const m of months.slice(0,6)) { const o=document.createElement('option'); o.value=m; o.textContent=formatMonth(m); sel.appendChild(o); }
      if (months.length) { currentMonth=months[0]; loadDevices(currentMonth); }
      else document.getElementById('device-rows').innerHTML='<tr><td colspan="12" class="empty">Keine Daten. "Intune Sync" ausführen.</td></tr>';
    }

    async function loadDevices(month) {
      const res = await fetch(`/api/devices.php?month=${encodeURIComponent(month)}`);
      const data = await res.json();
      allDevices = data.devices || [];
      currentPage = 1;
      renderTable();
    }

    function getFiltered() {
      const q = document.getElementById('search-input').value.toLowerCase();
      return allDevices.filter(d => {
        if (!q) return true;
        return [d.device_name,d.user_display_name,d.user_principal_name,d.manufacturer,d.model,d.device_category,d.serial_number,d.company_name,d.cost_center].join(' ').toLowerCase().includes(q);
      });
    }

    function renderTable() {
      const filtered = getFiltered();
      const tbody = document.getElementById('device-rows');
      const ps = document.getElementById('page-size').value;
      const pageSize = ps==='all' ? filtered.length : parseInt(ps);
      const totalPages = Math.max(1,Math.ceil(filtered.length/pageSize));
      if (currentPage>totalPages) currentPage=totalPages;
      const start=(currentPage-1)*pageSize;
      const page=filtered.slice(start,start+pageSize);
      document.getElementById('device-count').textContent=`${filtered.length} Geräte`;
      tbody.innerHTML='';
      if (!page.length) { tbody.innerHTML='<tr><td colspan="12" class="empty">Keine Ergebnisse</td></tr>'; }
      for (const d of page) {
        const compColor = d.compliance_state==='compliant'?'state-on':d.compliance_state==='noncompliant'?'state-off':'';
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${esc(d.device_name)}</td><td>${esc(d.user_display_name||'')}</td><td style="font-size:.85rem">${esc(d.user_principal_name||'')}</td>
          <td>${esc(d.manufacturer||'')}</td><td>${esc(d.model||'')}</td><td>${esc(d.device_category||'')}</td><td class="num">${d.device_price?Number(d.device_price).toLocaleString('de-DE',{minimumFractionDigits:2})+' \u20AC':''}</td><td>${esc(d.serial_number||'')}</td>
          <td class="${compColor}">${esc(d.compliance_state||'')}</td><td>${esc(d.company_name||'')}</td><td>${esc(d.cost_center||'')}</td><td style="font-size:.85rem">${fmtDate(d.last_sync)}</td>`;
        tbody.appendChild(tr);
      }
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const pag=document.getElementById('pagination'); pag.innerHTML=''; if(totalPages<=1)return;
      const addBtn=(l,p,dis,act)=>{const b=document.createElement('button');b.textContent=l;b.className='page-btn'+(act?' active':'');b.disabled=dis;if(!dis&&!act)b.addEventListener('click',()=>{currentPage=p;renderTable();});pag.appendChild(b);};
      addBtn('\u00AB',1,currentPage===1,false);addBtn('\u2039',currentPage-1,currentPage===1,false);
      let pages=[];if(totalPages<=7){for(let i=1;i<=totalPages;i++)pages.push(i);}else{pages.push(1);let rs=Math.max(2,currentPage-2),re=Math.min(totalPages-1,currentPage+2);if(currentPage<=3)re=Math.min(totalPages-1,5);if(currentPage>=totalPages-2)rs=Math.max(2,totalPages-4);if(rs>2)pages.push('...');for(let i=rs;i<=re;i++)pages.push(i);if(re<totalPages-1)pages.push('...');pages.push(totalPages);}
      for(const p of pages){if(p==='...'){const s=document.createElement('span');s.className='page-ellipsis';s.textContent='...';pag.appendChild(s);}else addBtn(String(p),p,false,p===currentPage);}
      addBtn('\u203A',currentPage+1,currentPage===totalPages,false);addBtn('\u00BB',totalPages,currentPage===totalPages,false);
    }

    document.getElementById('month-select').addEventListener('change',e=>{currentMonth=e.target.value;loadDevices(currentMonth);});
    document.getElementById('search-input').addEventListener('input',()=>{currentPage=1;renderTable();});
    document.getElementById('page-size').addEventListener('change',()=>{currentPage=1;renderTable();});
    document.getElementById('sync-btn').addEventListener('click',async()=>{
      const btn=document.getElementById('sync-btn');btn.disabled=true;btn.textContent='Synchronisiere…';
      try{const r=await fetch('/api/devices.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'sync'})});const d=await r.json();if(d.error)throw new Error(d.error);if(typeof showToast==='function')showToast(d.message,'success');loadDevices(currentMonth);}catch(e){if(typeof showToast==='function')showToast(e.message,'error');}finally{btn.disabled=false;btn.textContent='Intune Sync';}
    });
    init();
  </script>
</body>
</html>
