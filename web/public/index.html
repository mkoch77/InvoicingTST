<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting Dashboard</title>
  <link rel="stylesheet" href="/style.css?v=9">
</head>
<body>

  <div class="container">
    <div class="page-header">
      <h1>Dashboard</h1>
    </div>

    <div class="card-group">
      <h2 class="card-group-title">Rohdaten</h2>
      <div class="card-grid">

        <!-- VM-Kachel mit Statistiken -->
        <div class="card card-vm">
          <div class="card-icon">&#x1F5A5;</div>
          <h2>Virtuelle Maschinen</h2>
          <div id="vm-stats" class="vm-stats">
            <div class="vm-stats-loading">Lade Statistiken…</div>
          </div>
          <a href="/vms.html" class="card-link">Alle VMs anzeigen &rarr;</a>
        </div>

      </div>
    </div>

    <div class="card-group">
      <h2 class="card-group-title">Abrechnung</h2>
      <div class="card-grid">

        <div class="card card-vm">
          <div class="card-icon">&#x1F4B0;</div>
          <h2>Infrastructure-as-a-Service</h2>
          <div id="billing-stats" class="vm-stats">
            <div class="vm-stats-loading">Lade Abrechnung…</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/app.js?v=9"></script>
  <script>
    async function loadStats() {
      const container = document.getElementById('vm-stats');
      try {
        const res = await fetch('/api/stats.php');
        const s = await res.json();
        if (s.error) throw new Error(s.error);

        const month = s.month || '';
        const link = (filter) => `/vms.html?month=${encodeURIComponent(month)}&filter=${filter}`;

        container.innerHTML = `
          <div class="vm-stats-month">${formatMonth(month)}</div>
          <div class="vm-stats-grid">
            <a href="${link('citrix')}" class="stat-row">
              <span class="stat-label">Citrix Worker</span>
              <span class="stat-value">${s.citrix}</span>
            </a>
            <a href="${link('server')}" class="stat-row">
              <span class="stat-label">Server – Neue Infrastruktur</span>
              <span class="stat-value">${s.server}</span>
            </a>
            <a href="${link('templates')}" class="stat-row">
              <span class="stat-label">Templates</span>
              <span class="stat-value">${s.templates}</span>
            </a>
            <a href="${link('other')}" class="stat-row">
              <span class="stat-label">Sonstige</span>
              <span class="stat-value">${s.other}</span>
            </a>
            <div class="stat-divider"></div>
            <a href="/vms.html?month=${encodeURIComponent(month)}" class="stat-row stat-total">
              <span class="stat-label">Gesamt</span>
              <span class="stat-value">${s.total}</span>
            </a>
            <a href="${link('off_suspended')}" class="stat-row stat-muted">
              <span class="stat-label">davon Off / Suspended</span>
              <span class="stat-value">${s.off_suspended}</span>
            </a>
          </div>
        `;
        // Billing card
        renderBilling(s);
      } catch (err) {
        container.innerHTML = `<div class="vm-stats-loading">Fehler: ${err.message}</div>`;
      }
    }

    function renderBilling(s) {
      const container = document.getElementById('billing-stats');
      const b = s.billing;
      if (!b) {
        container.innerHTML = '<div class="vm-stats-loading">Keine Abrechnungsdaten</div>';
        return;
      }

      const classes = b.class_counts || {};
      let rows = '';
      for (const [cls, data] of Object.entries(classes)) {
        const lineTotal = data.count * data.price;
        rows += `
          <div class="stat-row">
            <span class="stat-label">${cls} <span style="color:var(--text-muted);font-weight:400;">&times; ${data.count}</span></span>
            <span class="stat-value">${fmtEur(lineTotal)}</span>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="vm-stats-month">${formatMonth(s.month)}</div>
        <div class="vm-stats-grid">
          ${rows}
          <div class="stat-divider"></div>
          <div class="stat-row stat-total">
            <span class="stat-label">${b.vm_count} VMs</span>
            <span class="stat-value">${fmtEur(b.total_price)}</span>
          </div>
        </div>
      `;
    }

    function fmtEur(val) {
      return Number(val).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' \u20AC';
    }

    function formatMonth(m) {
      if (!m) return '';
      const [y, mo] = m.split('-');
      const d = new Date(y, parseInt(mo) - 1);
      return d.toLocaleDateString('de-DE', { year: 'numeric', month: 'long' });
    }

    loadStats();
  </script>
</body>
</html>
