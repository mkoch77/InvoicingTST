services:
  postgres:
    build: ./postgres
    container_name: accounting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-accounting}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: ${PG_DATABASE:-InvoicingAssets}
    ports:
      - "5432:5432"
    volumes:
      - accounting-pgdata:/var/lib/postgresql/data

  web:
    build: ./web
    container_name: accounting-web
    restart: unless-stopped
    environment:
      PGHOST: accounting-postgres
      PGPORT: 5432
      PGUSER: ${PG_USER:-accounting}
      PGPASSWORD: ${PG_PASSWORD}
      PGDATABASE: ${PG_DATABASE:-InvoicingAssets}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_REDIRECT_URI: ${ENTRA_REDIRECT_URI:-}
    expose:
      - "80"
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: accounting-nginx
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint.sh"]
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - web

  # Let's Encrypt: einkommentieren sobald Domain vorhanden
  # certbot:
  #   image: certbot/certbot
  #   container_name: accounting-certbot
  #   volumes:
  #     - ./nginx/certs:/etc/letsencrypt
  #     - certbot-webroot:/var/www/certbot
  #   command: certonly --webroot -w /var/www/certbot --email admin@example.com -d example.com --agree-tos --no-eff-email

volumes:
  accounting-pgdata:
  certbot-webroot:
